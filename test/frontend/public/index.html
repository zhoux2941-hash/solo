<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物联网智能插座</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .socket-display {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 0 auto 25px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e0e0e0, #f5f5f5);
            box-shadow: 
                20px 20px 60px #bebebe,
                -20px -20px 60px #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .socket-display.on {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            box-shadow: 
                0 0 40px rgba(74, 222, 128, 0.6),
                inset 20px 20px 60px rgba(34, 197, 94, 0.3);
        }

        .socket-display.off {
            background: linear-gradient(145deg, #e0e0e0, #f5f5f5);
        }

        .socket-icon {
            font-size: 55px;
            transition: all 0.3s ease;
        }

        .socket-display.on .socket-icon {
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .socket-display.off .socket-icon {
            color: #999;
        }

        .status-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 18px;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .status-text.on {
            background: rgba(74, 222, 128, 0.2);
            color: #15803d;
        }

        .status-text.off {
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
        }

        .status-text.unknown {
            background: rgba(156, 163, 175, 0.2);
            color: #4b5563;
        }

        .response-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
            border: 2px solid #e9ecef;
            min-height: 70px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .response-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .response-content {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .response-content.success {
            color: #15803d;
        }

        .response-content.error {
            color: #991b1b;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 14px 28px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-on {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        }

        .btn-on:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.6);
        }

        .btn-off {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .btn-off:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }

        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            background: #f8f9fa;
            margin-bottom: 20px;
        }

        .connection-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #9ca3af;
            transition: all 0.3s ease;
        }

        .connection-indicator.connected {
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
        }

        .connection-indicator.disconnected {
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .report-section {
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px solid #e9ecef;
            overflow: hidden;
        }

        .report-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .report-title {
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .report-count {
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 12px;
        }

        .report-list {
            max-height: 280px;
            overflow-y: auto;
            padding: 0;
        }

        .report-item {
            padding: 12px 16px;
            border-bottom: 1px solid #e9ecef;
            background: white;
            transition: all 0.3s ease;
        }

        .report-item:last-child {
            border-bottom: none;
        }

        .report-item.new {
            animation: slideIn 0.3s ease-out;
            background: #f0fdf4;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .report-time {
            font-size: 11px;
            color: #9ca3af;
            margin-bottom: 6px;
        }

        .report-content {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            font-size: 13px;
        }

        .report-tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }

        .tag-online {
            background: rgba(34, 197, 94, 0.1);
            color: #15803d;
        }

        .tag-offline {
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
        }

        .tag-on {
            background: rgba(74, 222, 128, 0.15);
            color: #15803d;
        }

        .tag-off {
            background: rgba(107, 114, 128, 0.1);
            color: #4b5563;
        }

        .tag-device {
            background: rgba(99, 102, 241, 0.1);
            color: #4f46e5;
        }

        .report-empty {
            padding: 40px 20px;
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
        }

        .report-empty-icon {
            font-size: 32px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .debug-info {
            margin-top: 15px;
            padding: 10px;
            background: #f0f4ff;
            border-radius: 8px;
            font-size: 12px;
            color: #4f46e5;
            text-align: left;
        }

        .debug-info .debug-title {
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .debug-info .debug-content {
            font-family: monospace;
            font-size: 11px;
            max-height: 100px;
            overflow-y: auto;
            background: white;
            padding: 8px;
            border-radius: 4px;
            white-space: pre-wrap;
            word-break: break-all;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        .report-list::-webkit-scrollbar {
            width: 6px;
        }

        .report-list::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 3px;
        }

        .report-list::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }

        .report-list::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 智能插座</h1>
            <p>物联网智能控制系统</p>
        </div>

        <div class="socket-display off" id="socketDisplay">
            <div class="socket-icon">⚡</div>
        </div>

        <div class="status-text unknown" id="statusText">状态: 未知</div>

        <div class="response-box">
            <div class="response-label">后端响应</div>
            <div class="response-content" id="responseContent">等待指令...</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="controls">
            <button class="btn btn-on" id="btnOn" onclick="sendCommand('开')">开启</button>
            <button class="btn btn-off" id="btnOff" onclick="sendCommand('关')">关闭</button>
        </div>

        <div class="connection-status">
            <div class="connection-indicator" id="connectionIndicator"></div>
            <span id="connectionText">连接中...</span>
        </div>

        <div class="report-section">
            <div class="report-header">
                <span class="report-title">📋 设备上报日志</span>
                <span class="report-count" id="reportCount">0/10 条</span>
            </div>
            <div class="report-list" id="reportList">
                <div class="report-empty">
                    <div class="report-empty-icon">📡</div>
                    <div>等待设备上报数据...</div>
                    <div style="font-size: 12px; margin-top: 5px; color: #6b7280;">上报周期: 30秒</div>
                </div>
            </div>
        </div>

        <div class="debug-info">
            <div class="debug-title">
                <span>🔧 调试信息</span>
                <span id="reportCountDebug">收到: 0 条</span>
            </div>
            <div class="debug-content" id="debugContent">等待连接...</div>
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let currentStatus = '未知';
        const MAX_REPORTS = 10;
        let reportHistory = [];
        let totalReportsReceived = 0;
        let debugLogs = [];

        const socketDisplay = document.getElementById('socketDisplay');
        const statusText = document.getElementById('statusText');
        const responseContent = document.getElementById('responseContent');
        const connectionIndicator = document.getElementById('connectionIndicator');
        const connectionText = document.getElementById('connectionText');
        const errorMessage = document.getElementById('errorMessage');
        const btnOn = document.getElementById('btnOn');
        const btnOff = document.getElementById('btnOff');
        const reportList = document.getElementById('reportList');
        const reportCount = document.getElementById('reportCount');
        const reportCountDebug = document.getElementById('reportCountDebug');
        const debugContent = document.getElementById('debugContent');

        function addDebugLog(message) {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN', { hour12: false });
            const log = `[${timeStr}] ${message}`;
            
            debugLogs.unshift(log);
            if (debugLogs.length > 20) {
                debugLogs.pop();
            }
            
            debugContent.textContent = debugLogs.join('\n');
            console.log(log);
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + '//' + window.location.host;
            
            addDebugLog('正在连接 WebSocket: ' + wsUrl);
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                addDebugLog('✅ WebSocket 连接成功!');
                isConnected = true;
                updateConnectionStatus(true);
                hideError();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    addDebugLog('📨 收到消息: ' + data.type);
                    handleMessage(data);
                } catch (err) {
                    addDebugLog('❌ 解析消息失败: ' + err.message);
                    console.error('解析消息失败:', err);
                }
            };

            ws.onclose = () => {
                addDebugLog('⚠️ WebSocket 连接断开，3秒后重连...');
                isConnected = false;
                updateConnectionStatus(false);
                showError('连接已断开，正在重连...');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                addDebugLog('❌ WebSocket 错误');
                showError('连接错误');
            };
        }

        function handleMessage(data) {
            addDebugLog('   数据: ' + JSON.stringify(data).substring(0, 100) + '...');

            if (data.type === 'init' || data.type === 'status') {
                if (data.status) {
                    addDebugLog('   更新状态: ' + data.status);
                    updateStatus(data.status);
                }
                if (data.response) {
                    addDebugLog('   更新响应: ' + data.response);
                    updateResponse(data.response);
                }
            } else if (data.type === 'report') {
                totalReportsReceived++;
                reportCountDebug.textContent = '收到: ' + totalReportsReceived + ' 条';
                addDebugLog('📊 设备上报 #' + totalReportsReceived);
                addDebugLog('   设备: ' + data.data.deviceId);
                addDebugLog('   在线: ' + data.data.isOnline);
                addDebugLog('   状态: ' + data.data.statusText);
                addDebugLog('   时间: ' + data.data.timestamp);
                addReport(data.data);
            } else if (data.type === 'error') {
                addDebugLog('❌ 错误: ' + data.message);
                showError(data.message);
            }
        }

        function addReport(reportData) {
            addDebugLog('📋 添加上报记录到列表...');
            
            reportHistory.unshift(reportData);
            
            if (reportHistory.length > MAX_REPORTS) {
                const removed = reportHistory.pop();
                addDebugLog('   超出10条，移除旧记录: ' + removed.timestamp);
            }

            addDebugLog('   当前列表条数: ' + reportHistory.length);
            renderReportList();
        }

        function renderReportList() {
            addDebugLog('🎨 渲染上报列表...');
            
            if (reportHistory.length === 0) {
                addDebugLog('   列表为空');
                reportList.innerHTML = `
                    <div class="report-empty">
                        <div class="report-empty-icon">📡</div>
                        <div>等待设备上报数据...</div>
                        <div style="font-size: 12px; margin-top: 5px; color: #6b7280;">上报周期: 30秒</div>
                    </div>
                `;
                reportCount.textContent = '0/10 条';
                return;
            }

            reportCount.textContent = `${reportHistory.length}/10 条`;
            addDebugLog('   渲染 ' + reportHistory.length + ' 条记录');

            let html = '';
            reportHistory.forEach((report, index) => {
                const isNew = index === 0;
                const onlineClass = report.isOnline ? 'tag-online' : 'tag-offline';
                const onlineText = report.isOnline ? '在线' : '离线';
                const statusClass = report.socketStatus ? 'tag-on' : 'tag-off';
                const statusText = report.socketStatus ? '已开启' : '已关闭';

                html += `
                    <div class="report-item${isNew ? ' new' : ''}">
                        <div class="report-time">#${totalReportsReceived - index} ${report.timestamp}</div>
                        <div class="report-content">
                            <span class="report-tag tag-device">
                                <span>📱</span> ${report.deviceId || 'smart-socket-001'}
                            </span>
                            <span class="report-tag ${onlineClass}">
                                <span>${report.isOnline ? '🟢' : '🔴'}</span> ${onlineText}
                            </span>
                            <span class="report-tag ${statusClass}">
                                <span>${report.socketStatus ? '⚡' : '💤'}</span> ${statusText}
                            </span>
                        </div>
                    </div>
                `;
            });

            reportList.innerHTML = html;
            addDebugLog('✅ 渲染完成');
        }

        function updateStatus(status) {
            currentStatus = status;
            socketDisplay.classList.remove('on', 'off');
            statusText.classList.remove('on', 'off', 'unknown');

            if (status === '已开启') {
                socketDisplay.classList.add('on');
                statusText.classList.add('on');
                statusText.textContent = '状态: 已开启';
            } else if (status === '已关闭') {
                socketDisplay.classList.add('off');
                statusText.classList.add('off');
                statusText.textContent = '状态: 已关闭';
            } else {
                statusText.classList.add('unknown');
                statusText.textContent = '状态: ' + status;
            }
        }

        function updateResponse(response) {
            responseContent.textContent = response;
            responseContent.classList.remove('success', 'error');
            
            if (response.includes('成功')) {
                responseContent.classList.add('success');
            }
        }

        function updateConnectionStatus(connected) {
            connectionIndicator.classList.remove('connected', 'disconnected');
            if (connected) {
                connectionIndicator.classList.add('connected');
                connectionText.textContent = '已连接';
                btnOn.disabled = false;
                btnOff.disabled = false;
            } else {
                connectionIndicator.classList.add('disconnected');
                connectionText.textContent = '未连接';
                btnOn.disabled = true;
                btnOff.disabled = true;
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        function sendCommand(command) {
            if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {
                addDebugLog('❌ 未连接，无法发送指令');
                showError('未连接到服务器，请稍后重试');
                return;
            }

            const message = {
                type: 'command',
                command: command
            };

            addDebugLog('📤 发送指令: ' + command);
            ws.send(JSON.stringify(message));
            
            responseContent.textContent = '发送中...';
            responseContent.classList.add('loading');
            
            setTimeout(() => {
                responseContent.classList.remove('loading');
            }, 1000);
        }

        addDebugLog('🚀 页面加载完成，开始连接...');
        connectWebSocket();
    </script>
</body>
</html>
