<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物联网智能插座</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .header {
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .socket-display {
            position: relative;
            width: 180px;
            height: 180px;
            margin: 0 auto 30px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e0e0e0, #f5f5f5);
            box-shadow: 
                20px 20px 60px #bebebe,
                -20px -20px 60px #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.5s ease;
        }

        .socket-display.on {
            background: linear-gradient(145deg, #4ade80, #22c55e);
            box-shadow: 
                0 0 40px rgba(74, 222, 128, 0.6),
                inset 20px 20px 60px rgba(34, 197, 94, 0.3);
        }

        .socket-display.off {
            background: linear-gradient(145deg, #e0e0e0, #f5f5f5);
        }

        .socket-icon {
            font-size: 60px;
            transition: all 0.3s ease;
        }

        .socket-display.on .socket-icon {
            color: white;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8);
        }

        .socket-display.off .socket-icon {
            color: #999;
        }

        .status-text {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            padding: 10px 20px;
            border-radius: 10px;
            display: inline-block;
        }

        .status-text.on {
            background: rgba(74, 222, 128, 0.2);
            color: #15803d;
        }

        .status-text.off {
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
        }

        .status-text.unknown {
            background: rgba(156, 163, 175, 0.2);
            color: #4b5563;
        }

        .response-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #e9ecef;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .response-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .response-content {
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        .response-content.success {
            color: #15803d;
        }

        .response-content.error {
            color: #991b1b;
        }

        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .btn {
            flex: 1;
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-on {
            background: linear-gradient(135deg, #4ade80, #22c55e);
            color: white;
            box-shadow: 0 4px 15px rgba(74, 222, 128, 0.4);
        }

        .btn-on:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(74, 222, 128, 0.6);
        }

        .btn-off {
            background: linear-gradient(135deg, #f87171, #ef4444);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .btn-off:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }

        .connection-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            color: #666;
            background: #f8f9fa;
        }

        .connection-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #9ca3af;
            transition: all 0.3s ease;
        }

        .connection-indicator.connected {
            background: #22c55e;
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
        }

        .connection-indicator.disconnected {
            background: #ef4444;
            box-shadow: 0 0 10px rgba(239, 68, 68, 0.6);
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #991b1b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.5;
            }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 智能插座</h1>
            <p>物联网智能控制系统</p>
        </div>

        <div class="socket-display off" id="socketDisplay">
            <div class="socket-icon">⚡</div>
        </div>

        <div class="status-text unknown" id="statusText">状态: 未知</div>

        <div class="response-box">
            <div class="response-label">后端响应</div>
            <div class="response-content" id="responseContent">等待指令...</div>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <div class="controls">
            <button class="btn btn-on" id="btnOn" onclick="sendCommand('开')">开启</button>
            <button class="btn btn-off" id="btnOff" onclick="sendCommand('关')">关闭</button>
        </div>

        <div class="connection-status">
            <div class="connection-indicator" id="connectionIndicator"></div>
            <span id="connectionText">连接中...</span>
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let currentStatus = '未知';

        const socketDisplay = document.getElementById('socketDisplay');
        const statusText = document.getElementById('statusText');
        const responseContent = document.getElementById('responseContent');
        const connectionIndicator = document.getElementById('connectionIndicator');
        const connectionText = document.getElementById('connectionText');
        const errorMessage = document.getElementById('errorMessage');
        const btnOn = document.getElementById('btnOn');
        const btnOff = document.getElementById('btnOff');

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = protocol + '//' + window.location.host;
            
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket 已连接');
                isConnected = true;
                updateConnectionStatus(true);
                hideError();
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (err) {
                    console.error('解析消息失败:', err);
                }
            };

            ws.onclose = () => {
                console.log('WebSocket 已断开');
                isConnected = false;
                updateConnectionStatus(false);
                showError('连接已断开，正在重连...');
                setTimeout(connectWebSocket, 3000);
            };

            ws.onerror = (err) => {
                console.error('WebSocket 错误:', err);
                showError('连接错误');
            };
        }

        function handleMessage(data) {
            console.log('收到消息:', data);

            if (data.type === 'init' || data.type === 'status') {
                if (data.status) {
                    updateStatus(data.status);
                }
                if (data.response) {
                    updateResponse(data.response);
                }
            } else if (data.type === 'error') {
                showError(data.message);
            }
        }

        function updateStatus(status) {
            currentStatus = status;
            socketDisplay.classList.remove('on', 'off');
            statusText.classList.remove('on', 'off', 'unknown');

            if (status === '已开启') {
                socketDisplay.classList.add('on');
                statusText.classList.add('on');
                statusText.textContent = '状态: 已开启';
            } else if (status === '已关闭') {
                socketDisplay.classList.add('off');
                statusText.classList.add('off');
                statusText.textContent = '状态: 已关闭';
            } else {
                statusText.classList.add('unknown');
                statusText.textContent = '状态: ' + status;
            }
        }

        function updateResponse(response) {
            responseContent.textContent = response;
            responseContent.classList.remove('success', 'error');
            
            if (response.includes('成功')) {
                responseContent.classList.add('success');
            }
        }

        function updateConnectionStatus(connected) {
            connectionIndicator.classList.remove('connected', 'disconnected');
            if (connected) {
                connectionIndicator.classList.add('connected');
                connectionText.textContent = '已连接';
                btnOn.disabled = false;
                btnOff.disabled = false;
            } else {
                connectionIndicator.classList.add('disconnected');
                connectionText.textContent = '未连接';
                btnOn.disabled = true;
                btnOff.disabled = true;
            }
        }

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.add('show');
            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        function hideError() {
            errorMessage.classList.remove('show');
        }

        function sendCommand(command) {
            if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {
                showError('未连接到服务器，请稍后重试');
                return;
            }

            const message = {
                type: 'command',
                command: command
            };

            ws.send(JSON.stringify(message));
            console.log('已发送指令:', command);
            
            responseContent.textContent = '发送中...';
            responseContent.classList.add('loading');
            
            setTimeout(() => {
                responseContent.classList.remove('loading');
            }, 1000);
        }

        connectWebSocket();
    </script>
</body>
</html>
