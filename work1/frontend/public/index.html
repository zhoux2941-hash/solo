<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物联网智能插座控制系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
        }

        .status-dot {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse 2s infinite;
        }

        .status-dot.connected {
            background-color: #4CAF50;
        }

        .status-dot.disconnected {
            background-color: #f44336;
            animation: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(76, 175, 80, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(76, 175, 80, 0);
            }
        }

        .plug-status {
            text-align: center;
            margin-bottom: 40px;
        }

        .plug-icon {
            font-size: 80px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .plug-icon.on {
            color: #4CAF50;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .plug-icon.off {
            color: #ccc;
        }

        .plug-status-text {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .plug-status-text.on {
            color: #4CAF50;
        }

        .plug-status-text.off {
            color: #666;
        }

        .controls {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
        }

        .control-btn {
            flex: 1;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-on {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.4);
        }

        .btn-on:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.6);
        }

        .btn-off {
            background: linear-gradient(135deg, #f44336 0%, #da190b 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(244, 67, 54, 0.4);
        }

        .btn-off:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(244, 67, 54, 0.6);
        }

        .message-log {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            max-height: 300px;
            overflow-y: auto;
        }

        .message-log h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .message-item {
            background: white;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message-item.sent {
            border-left: 4px solid #2196F3;
        }

        .message-item.received {
            border-left: 4px solid #4CAF50;
        }

        .message-item.error {
            border-left: 4px solid #f44336;
        }

        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .message-type {
            font-weight: bold;
            font-size: 12px;
            text-transform: uppercase;
        }

        .message-type.sent {
            color: #2196F3;
        }

        .message-type.received {
            color: #4CAF50;
        }

        .message-type.error {
            color: #f44336;
        }

        .message-time {
            color: #999;
            font-size: 12px;
        }

        .message-content {
            color: #333;
            font-size: 14px;
            word-break: break-word;
        }

        .connection-info {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .connection-info h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #dee2e6;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-size: 13px;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            background: white;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #dee2e6;
        }

        .info-value.connected {
            color: #4CAF50;
            background: #e8f5e9;
            border-color: #c8e6c9;
        }

        .info-value.disconnected {
            color: #f44336;
            background: #ffebee;
            border-color: #ffcdd2;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 11px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>物联网智能插座</h1>
            <p>MQTT 远程控制系统</p>
        </div>

        <div class="status-indicator">
            <div class="status-dot disconnected" id="connectionStatus"></div>
            <span id="connectionText">未连接</span>
        </div>

        <div class="plug-status">
            <div class="plug-icon off" id="plugIcon">🔌</div>
            <div class="plug-status-text off" id="plugStatus">插座状态: 关闭</div>
        </div>

        <div class="controls">
            <button class="control-btn btn-on" id="btnOn" onclick="sendCommand('开')">
                <span class="loading" id="loadingOn" style="display: none;"></span>
                打开插座
            </button>
            <button class="control-btn btn-off" id="btnOff" onclick="sendCommand('关')">
                <span class="loading" id="loadingOff" style="display: none;"></span>
                关闭插座
            </button>
        </div>

        <div class="message-log">
            <h3>📋 消息日志</h3>
            <div id="messageList">
                <div class="message-item error">
                    <div class="message-header">
                        <span class="message-type error">系统</span>
                        <span class="message-time" id="systemTime"></span>
                    </div>
                    <div class="message-content">等待连接到服务器...</div>
                </div>
            </div>
        </div>

        <div class="connection-info">
            <h4>🔗 连接信息</h4>
            <div class="info-row">
                <span class="info-label">MQTT Broker:</span>
                <span class="info-value" id="brokerInfo">mqtt://broker-cn.emqx.io:1883</span>
            </div>
            <div class="info-row">
                <span class="info-label">命令主题:</span>
                <span class="info-value">smartplug/command</span>
            </div>
            <div class="info-row">
                <span class="info-label">响应主题:</span>
                <span class="info-value">smartplug/response</span>
            </div>
            <div class="info-row">
                <span class="info-label">MQTT 状态:</span>
                <span class="info-value" id="mqttStatusText">未知</span>
            </div>
        </div>

        <div class="footer">
            <p>使用免费公共 MQTT Broker: broker-cn.emqx.io (EMQX 中国)</p>
            <p>端口: 1883 (TCP) | 无需安装，直接使用 | 连接更稳定</p>
        </div>
    </div>

    <script>
        let ws = null;
        let isConnected = false;
        let currentStatus = 'off';

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            updateSystemTime();
            connectWebSocket();
        });

        function updateSystemTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            const timeElements = document.querySelectorAll('.message-time');
            if (timeElements.length > 0) {
                timeElements[timeElements.length - 1].textContent = timeStr;
            }
        }

        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}`;
            
            addMessage('系统', `正在连接到 ${wsUrl}...`, 'received');

            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                isConnected = true;
                updateConnectionStatus(true);
                addMessage('系统', 'WebSocket 连接已建立', 'received');
                setButtonsEnabled(true);
            };

            ws.onclose = () => {
                isConnected = false;
                updateConnectionStatus(false);
                addMessage('系统', '连接已断开，5秒后自动重连...', 'error');
                setButtonsEnabled(false);
                setTimeout(connectWebSocket, 5000);
            };

            ws.onerror = (error) => {
                console.error('WebSocket 错误:', error);
                addMessage('系统', '连接错误', 'error');
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleMessage(data);
                } catch (e) {
                    console.error('解析消息失败:', e);
                    addMessage('错误', '收到无效消息', 'error');
                }
            };
        }

        function handleMessage(data) {
            switch (data.type) {
                case 'status':
                    addMessage('系统', data.message, 'received');
                    break;

                case 'mqtt_status':
                    updateMqttStatus(data.connected, data.broker);
                    if (data.connected) {
                        addMessage('MQTT', `已连接到 Broker: ${data.broker}`, 'received');
                    } else {
                        addMessage('MQTT', `与 Broker 连接已断开`, 'error');
                    }
                    break;

                case 'sent':
                    addMessage('发送', `命令已发送: ${data.command}`, 'sent');
                    break;

                case 'response':
                    addMessage('接收', `收到响应: ${data.message}`, 'received');
                    handleResponse(data.message);
                    break;

                case 'error':
                    addMessage('错误', data.message, 'error');
                    break;
            }
        }

        function updateMqttStatus(connected, broker) {
            const mqttStatusText = document.getElementById('mqttStatusText');
            const brokerInfo = document.getElementById('brokerInfo');
            
            if (broker) {
                brokerInfo.textContent = broker;
            }
            
            if (connected) {
                mqttStatusText.textContent = '已连接';
                mqttStatusText.className = 'info-value connected';
            } else {
                mqttStatusText.textContent = '未连接';
                mqttStatusText.className = 'info-value disconnected';
            }
        }

        function handleResponse(message) {
            if (message === '开成功') {
                updatePlugStatus('on');
            } else if (message === '关成功') {
                updatePlugStatus('off');
            } else if (message.includes('当前状态')) {
                if (message.includes('开')) {
                    updatePlugStatus('on');
                } else {
                    updatePlugStatus('off');
                }
            }
        }

        function updatePlugStatus(status) {
            currentStatus = status;
            const plugIcon = document.getElementById('plugIcon');
            const plugStatus = document.getElementById('plugStatus');

            if (status === 'on') {
                plugIcon.className = 'plug-icon on';
                plugStatus.textContent = '插座状态: 打开';
                plugStatus.className = 'plug-status-text on';
            } else {
                plugIcon.className = 'plug-icon off';
                plugStatus.textContent = '插座状态: 关闭';
                plugStatus.className = 'plug-status-text off';
            }
        }

        function updateConnectionStatus(connected) {
            const statusDot = document.getElementById('connectionStatus');
            const statusText = document.getElementById('connectionText');

            if (connected) {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '已连接';
                statusText.style.color = '#4CAF50';
            } else {
                statusDot.className = 'status-dot disconnected';
                statusText.textContent = '未连接';
                statusText.style.color = '#666';
            }
        }

        function setButtonsEnabled(enabled) {
            document.getElementById('btnOn').disabled = !enabled;
            document.getElementById('btnOff').disabled = !enabled;
        }

        function sendCommand(command) {
            if (!isConnected || !ws || ws.readyState !== WebSocket.OPEN) {
                addMessage('错误', '未连接到服务器', 'error');
                return;
            }

            const loadingId = command === '开' ? 'loadingOn' : 'loadingOff';
            const loading = document.getElementById(loadingId);
            const btnId = command === '开' ? 'btnOn' : 'btnOff';
            const btn = document.getElementById(btnId);

            loading.style.display = 'inline-block';
            btn.disabled = true;

            const message = {
                type: 'command',
                command: command
            };

            ws.send(JSON.stringify(message));

            setTimeout(() => {
                loading.style.display = 'none';
                btn.disabled = false;
            }, 2000);
        }

        function addMessage(type, content, messageType) {
            const messageList = document.getElementById('messageList');
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');

            const messageDiv = document.createElement('div');
            messageDiv.className = `message-item ${messageType}`;
            messageDiv.innerHTML = `
                <div class="message-header">
                    <span class="message-type ${messageType}">${type}</span>
                    <span class="message-time">${timeStr}</span>
                </div>
                <div class="message-content">${content}</div>
            `;

            messageList.insertBefore(messageDiv, messageList.firstChild);

            const maxMessages = 20;
            while (messageList.children.length > maxMessages) {
                messageList.removeChild(messageList.lastChild);
            }
        }
    </script>
</body>
</html>
